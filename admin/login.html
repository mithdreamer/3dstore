<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Girişi | 3D Store</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body class="admin-page">
  <div class="admin-shell login-shell">
    <div class="admin-card login-card">
      <a class="brand" href="../public/index.html">
        <span class="brand-mark">3D</span>
        <span>3D Store<small>Admin Paneli</small></span>
      </a>
      <p class="admin-lead">Admin hesabınızla giriş yapın ve içerik yönetimine başlayın.</p>
      <form data-admin-login>
        <div class="field">
          <label for="admin-email">E-posta</label>
          <input id="admin-email" name="email" type="email" autocomplete="username" required>
        </div>
        <div class="field">
          <label for="admin-password">Şifre</label>
          <input id="admin-password" name="password" type="password" autocomplete="current-password" required>
        </div>
        <div class="form-error" aria-live="polite"></div>
        <button class="button full" type="submit">Giriş Yap</button>
      </form>
      <p class="admin-note">Demo giriş bilgisi: <strong>admin@3dstore.local</strong> / <strong>1234</strong></p>
    </div>
  </div>
  <script src="../js/app.js" defer></script>
  <script src="../js/admin.js" defer></script>
</body>
</html>
