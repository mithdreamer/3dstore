<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ürün Yönetimi | 3D Store Admin</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body class="admin-page">
  <div class="admin-shell">
    <header class="admin-header" data-admin-nav></header>
    <main class="admin-main" data-products-admin>
      <section class="admin-panel admin-panel-grid">
        <article class="admin-card">
          <h1>Ürün Yönetimi</h1>
          <p class="admin-note">Yeni ürün ekleyebilir, mevcut ürünü düzenleyebilir ve ürün listesini güncelleyebilirsiniz.</p>
          <form class="admin-form" data-product-form>
            <div class="field"><label for="product-id">ID</label><input id="product-id" name="id" required></div>
            <div class="field"><label for="product-name">Ürün Adı</label><input id="product-name" name="name" required></div>
            <div class="field"><label for="product-category">Kategori</label><select id="product-category" name="category"></select></div>
            <div class="field"><label for="product-price">Fiyat</label><input id="product-price" name="price" type="number" min="0" required></div>
            <div class="field"><label for="product-oldPrice">Eski Fiyat</label><input id="product-oldPrice" name="oldPrice" type="number" min="0"></div>
            <div class="field"><label for="product-rating">Puan</label><input id="product-rating" name="rating" type="number" min="0" max="5" step="0.1"></div>
            <div class="field"><label for="product-stock">Stok</label><input id="product-stock" name="stock" type="number" min="0"></div>
            <div class="field"><label for="product-material">Malzeme</label><input id="product-material" name="material" type="text"></div>
            <div class="field"><label for="product-finish">Yüzey</label><input id="product-finish" name="finish" type="text"></div>
            <div class="field"><label for="product-palette">Palette</label><input id="product-palette" name="palette" type="text"></div>
            <div class="field"><label for="product-shape">Shape</label><input id="product-shape" name="shape" type="text"></div>
            <div class="field"><label for="product-tags">Etiketler</label><input id="product-tags" name="tags" type="text" placeholder="etiket1, etiket2"></div>
            <div class="field"><label for="product-image">Görsel URL</label><input id="product-image" name="image" type="url" placeholder="../assets/images/product-placeholder.svg"></div>
            <div class="field"><label for="product-description">Açıklama</label><textarea id="product-description" name="description"></textarea></div>
            <div class="field"><label><input name="featured" type="checkbox"> Öne çıkan ürün</label></div>
            <div class="admin-buttons">
              <button class="button" type="submit" data-product-submit>Kaydet</button>
              <button class="button secondary" type="button" data-product-reset>Temizle</button>
            </div>
            <p class="admin-note" data-form-message></p>
          </form>
        </article>
        <article class="admin-card">
          <h2>Kategoriler</h2>
          <p class="admin-note">Yeni kategori ekleyebilir veya mevcut kategorileri silebilirsiniz.</p>
          <div data-category-manager></div>
        </article>
        <article class="admin-card">
          <h2>Ürün Listesi</h2>
          <table class="admin-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Ad</th>
                <th>Kategori</th>
                <th>Fiyat</th>
                <th>Stok</th>
                <th>Öne Çıkan</th>
                <th>Aksiyon</th>
              </tr>
            </thead>
            <tbody data-product-table></tbody>
          </table>
        </article>
      </section>
    </main>
  </div>
  <script src="../js/app.js" defer></script>
  <script src="../js/admin.js" defer></script>
</body>
</html>
